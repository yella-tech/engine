<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yella // engine</title>
<link rel="stylesheet" href="/brutalist.css">
<script type="importmap">
{
  "imports": {
    "preact": "https://esm.sh/preact@10.25.4",
    "preact/hooks": "https://esm.sh/preact@10.25.4/hooks",
    "htm/preact": "https://esm.sh/htm@3.1.1/preact"
  }
}
</script>
<style>
/* Dashboard-specific overrides */
html, body { height: 100%; overflow: hidden; }
body { display: flex; flex-direction: column; font-size: var(--text-sm); }
#app { display: flex; flex-direction: column; flex: 1; min-height: 0; }

/* Nav tweaks for dashboard */
.nav { flex-shrink: 0; }
.nav-link { cursor: pointer; }
.nav-link svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* Topbar */
.topbar {
  height: 32px;
  display: flex;
  align-items: center;
  padding: 0 var(--space-5);
  gap: var(--space-3);
  border-bottom: var(--border) solid var(--black);
  background: var(--surface);
  flex-shrink: 0;
}

.status-dot {
  width: 6px;
  height: 6px;
  background: var(--black);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* Main content area */
.dashboard-main {
  flex: 1;
  overflow-y: auto;
  padding: var(--space-5);
}

/* Stat values */
.stat-value {
  font-size: var(--text-3xl);
  font-weight: 700;
  line-height: 1;
  letter-spacing: var(--tracking-tight);
}

/* Table clickable rows */
.table tr.clickable { cursor: pointer; }
.table tr.clickable.active-row { background: var(--surface); }
.table th:last-child, .table td:last-child { width: 80px; }

/* Empty state */
.empty {
  font-size: var(--text-sm);
  padding: var(--space-7) 0;
  text-align: center;
  color: var(--muted);
}

/* JSON block */
.json-block {
  background: var(--black);
  color: var(--white);
  font-family: var(--font);
  font-size: var(--text-sm);
  padding: var(--space-4);
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 240px;
  overflow-y: auto;
  margin: var(--space-1) 0;
}

/* Detail rows */
.detail-row {
  display: flex;
  border-bottom: var(--border-thin) solid var(--black);
  padding: var(--space-2) 0;
}

.detail-key {
  width: 120px;
  flex-shrink: 0;
  padding-top: 2px;
}

.detail-val {
  flex: 1;
  word-break: break-all;
}

/* Timeline (replaces chain visualization) */
.timeline { margin-top: var(--space-4); }

.timeline-step {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-2) var(--space-3);
  border-bottom: var(--border-thin) solid var(--black);
  cursor: pointer;
  font-size: var(--text-sm);
}

.timeline-step:hover { background: var(--surface); }
.timeline-step.selected { background: var(--accent); }

.timeline-step-num {
  width: 20px;
  flex-shrink: 0;
  font-weight: 700;
  text-align: right;
  color: var(--muted);
}

.timeline-step.selected .timeline-step-num { color: var(--black); }

.timeline-step-dot {
  width: 8px;
  height: 8px;
  flex-shrink: 0;
  border: 2px solid var(--muted);
}

.timeline-step-dot.completed { border-color: var(--black); background: var(--accent); }
.timeline-step-dot.errored { border-color: var(--black); background: var(--black); }
.timeline-step-dot.running { border-color: var(--black); background: var(--black); }
.timeline-step-dot.idle { border-color: var(--muted); background: var(--surface); }

.timeline-step-name { font-weight: 700; flex: 1; }

.timeline-step-icon {
  width: 16px;
  flex-shrink: 0;
  text-align: center;
}

/* Step detail panel */
.step-detail {
  border: var(--border-thick) solid var(--black);
  margin-top: var(--space-4);
  padding: var(--space-4);
}

.step-detail-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--space-3);
  padding-bottom: var(--space-2);
  border-bottom: var(--border) solid var(--black);
}

.step-detail-title {
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: var(--tracking-wide);
  font-size: var(--text-sm);
}

.effects-list {
  margin: var(--space-2) 0;
}

.effect-item {
  display: flex;
  align-items: flex-start;
  gap: var(--space-3);
  padding: var(--space-2) 0;
  border-bottom: var(--border-thin) solid var(--muted);
  font-size: var(--text-sm);
}

.effect-key {
  font-weight: 700;
  flex-shrink: 0;
  min-width: 120px;
}

.effect-state {
  flex-shrink: 0;
  width: 80px;
}

.effect-toggle {
  cursor: pointer;
  text-decoration: underline;
  font-size: var(--text-xs);
  color: var(--muted);
}

.effect-output {
  display: none;
  margin-top: var(--space-1);
}

.effect-output.open { display: block; }

.step-actions {
  display: flex;
  gap: var(--space-3);
  margin-top: var(--space-4);
}

/* Emit result */
.emit-result {
  margin-top: var(--space-4);
  padding: var(--space-4);
  border: var(--border-thick) solid var(--black);
  font-size: var(--text-sm);
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 200px;
  overflow-y: auto;
}

.emit-result.error { background: var(--black); color: var(--white); }
.emit-result.success { background: var(--accent); color: var(--black); }

/* Ticker */
.ticker {
  height: 28px;
  background: var(--black);
  color: var(--white);
  display: flex;
  align-items: center;
  padding: 0 var(--space-5);
  gap: var(--space-3);
  flex-shrink: 0;
  overflow: hidden;
}

.ticker-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: var(--tracking-wider);
  flex-shrink: 0;
  color: var(--accent);
}

.ticker-messages {
  flex: 1;
  overflow: hidden;
  font-size: var(--text-xs);
  white-space: nowrap;
  color: var(--white);
}

.ticker-msg .t-time { opacity: 0.5; }
.ticker-msg .t-event { color: var(--accent); }

/* Overlay: slide-in panel */
.run-overlay {
  display: none;
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: 560px;
  background: var(--white);
  border-left: var(--border-heavy) solid var(--black);
  z-index: 100;
  flex-direction: column;
  box-shadow: -4px 0 0 var(--black);
}

.run-overlay.open { display: flex; }

.overlay-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-3) var(--space-5);
  border-bottom: var(--border-thick) solid var(--black);
  background: var(--black);
  color: var(--white);
  flex-shrink: 0;
}

.overlay-body {
  flex: 1;
  overflow-y: auto;
  padding: var(--space-5);
}

/* Mobile */
@media (max-width: 768px) {
  .run-overlay { width: 100%; left: 0; }
  .stats-grid.grid-4 { grid-template-columns: repeat(2, 1fr); }
  .trace-select select { min-width: 0; width: 100%; }
  .detail-row { flex-direction: column; gap: var(--space-1); }
  .detail-key { width: auto; }
}
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
import { h, render } from 'preact'
import { useState, useEffect, useRef, useCallback } from 'preact/hooks'
import { html } from 'htm/preact'

// ─── Utilities ───────────────────────────────────────────────

function shortId(id) {
  return id && id.length > 12 ? id.slice(0, 8) + '...' : (id || '--')
}

function formatUptime(seconds) {
  if (!seconds && seconds !== 0) return '--'
  const hr = Math.floor(seconds / 3600)
  const m = Math.floor((seconds % 3600) / 60)
  const s = Math.floor(seconds % 60)
  return (hr > 0 ? hr + 'h ' : '') + (m > 0 ? m + 'm ' : '') + s + 's'
}

function formatJson(obj) {
  if (obj === null || obj === undefined) return 'null'
  try { return JSON.stringify(obj, null, 2) } catch { return String(obj) }
}

function timeAgo(epochMs) {
  if (!epochMs) return '--'
  const diff = Date.now() - epochMs
  if (diff < 1000) return 'just now'
  const s = Math.floor(diff / 1000)
  if (s < 60) return s + 's ago'
  const m = Math.floor(s / 60)
  if (m < 60) return m + 'm ago'
  const hr = Math.floor(m / 60)
  if (hr < 24) return hr + 'h ago'
  return Math.floor(hr / 24) + 'd ago'
}

function timeStr() {
  return new Date().toTimeString().slice(0, 8)
}

function stripEffectPrefix(key) {
  if (key.startsWith('str:')) return key.slice(4)
  if (key.startsWith('arr:v1:')) {
    try { return JSON.parse(key.slice(7)).join(' / ') } catch { return key.slice(7) }
  }
  return key
}

async function api(path, opts) {
  const res = await fetch(path, opts)
  return res.json()
}

// ─── Hooks ───────────────────────────────────────────────────

function usePolling(fn, ms, enabled) {
  const saved = useRef(fn)
  useEffect(() => { saved.current = fn })
  useEffect(() => {
    if (!enabled) return
    saved.current()
    const id = setInterval(() => saved.current(), ms)
    return () => clearInterval(id)
  }, [ms, enabled])
}

function useEscapeKey(handler) {
  const saved = useRef(handler)
  useEffect(() => { saved.current = handler })
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') saved.current() }
    document.addEventListener('keydown', onKey)
    return () => document.removeEventListener('keydown', onKey)
  }, [])
}

// ─── Shared Components ───────────────────────────────────────

function Badge({ state }) {
  return html`<span class="badge badge-${state}">${state}</span>`
}

function JsonBlock({ data }) {
  return html`<div class="json-block">${typeof data === 'string' ? data : formatJson(data)}</div>`
}

function DetailRow({ label, children }) {
  return html`<div class="detail-row"><div class="detail-key label-muted">${label}</div><div class="detail-val">${children}</div></div>`
}

// ─── Nav Icons (raw SVG as htm) ──────────────────────────────

const icons = {
  overview: html`<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>`,
  processes: html`<svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>`,
  runs: html`<svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`,
  trace: html`<svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="15" y2="6"/><line x1="5" y1="12" x2="21" y2="12"/><line x1="7" y1="18" x2="18" y2="18"/></svg>`,
  emit: html`<svg viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>`,
}

const TABS = ['overview', 'processes', 'runs', 'trace', 'emit']

// ─── Nav ─────────────────────────────────────────────────────

function Nav({ activeTab, uptime, onTab }) {
  return html`
    <nav class="nav">
      <a class="nav-brand" href="/">YELLA</a>
      <ul class="nav-items">
        ${TABS.map(t => html`
          <li class="nav-item">
            <button class="nav-link ${activeTab === t ? 'active' : ''}" onClick=${() => onTab(t)} title=${t}>
              ${icons[t]}
              <span class="hide-mobile">${t.charAt(0).toUpperCase() + t.slice(1)}</span>
            </button>
          </li>
        `)}
      </ul>
      <div style="margin-left:auto;display:flex;align-items:center;gap:var(--space-3);padding-right:var(--space-4)">
        <div class="status-dot"></div>
        <span class="label-muted" style="margin:0">${uptime}</span>
      </div>
    </nav>
  `
}

// ─── Ticker ──────────────────────────────────────────────────

function Ticker({ messages }) {
  const inner = messages.length
    ? messages.map((m, i) => html`<span key=${i}>${i > 0 ? ' \u00b7 ' : ''}${m}</span>`)
    : html`<span class="ticker-msg"><span class="t-time">--:--:--</span> waiting for events...</span>`
  return html`
    <div class="ticker">
      <span class="ticker-label">Activity</span>
      <div class="ticker-messages">${inner}</div>
    </div>
  `
}

// ─── TickerMsg helper ────────────────────────────────────────

function TickerMsg({ time, children }) {
  return html`<span class="ticker-msg"><span class="t-time">${time}</span> ${children}</span>`
}

// ─── StatsGrid ───────────────────────────────────────────────

function StatsGrid({ queue }) {
  const stats = [
    ['Running', queue.running],
    ['Idle', queue.idle],
    ['Completed', queue.completed],
    ['Errored', queue.errored],
  ]
  return html`
    <div class="grid grid-4 mb-5">
      ${stats.map(([label, val]) => html`
        <div class="card card-flat" key=${label}>
          <div class="card-body">
            <span class="label-muted">${label}</span>
            <div class="stat-value">${val ?? 0}</div>
          </div>
        </div>
      `)}
    </div>
  `
}

// ─── RunsTable ───────────────────────────────────────────────

function RunsTable({ runs, onRowClick, activeRunId }) {
  if (!runs || !runs.length) {
    return html`<div class="empty">No runs yet</div>`
  }
  return html`
    <div class="table-wrap">
      <table class="table table-hover">
        <thead><tr><th>ID</th><th>Process</th><th>Event</th><th>State</th><th>When</th></tr></thead>
        <tbody>
          ${runs.map(r => html`
            <tr key=${r.id} class="clickable ${r.id === activeRunId ? 'active-row' : ''}" onClick=${() => onRowClick(r.id)}>
              <td>${shortId(r.id)}</td>
              <td>${r.processName || '--'}</td>
              <td>${r.eventName || '--'}</td>
              <td><${Badge} state=${r.state} /></td>
              <td class="label-muted">${timeAgo(r.startedAt)}</td>
            </tr>
          `)}
        </tbody>
      </table>
    </div>
  `
}

// ─── Overview Panel ──────────────────────────────────────────

function OverviewPanel({ health, recentRuns, onRowClick, activeRunId }) {
  return html`
    <div>
      <${StatsGrid} queue=${health.queue || {}} />
      <div class="label mb-3">Recent Runs <span class="badge badge-idle">${recentRuns.total ?? 0}</span></div>
      <${RunsTable} runs=${recentRuns.runs} onRowClick=${onRowClick} activeRunId=${activeRunId} />
    </div>
  `
}

// ─── Processes Panel ─────────────────────────────────────────

function ProcessesPanel({ processes, onEmit }) {
  if (!processes || !processes.length) {
    return html`<div class="empty">No processes registered</div>`
  }
  return html`
    <div class="table-wrap">
      <table class="table">
        <thead><tr><th>Name</th><th>Event</th><th></th></tr></thead>
        <tbody>
          ${processes.map(p => html`
            <tr key=${p.name}>
              <td>${p.name}</td>
              <td>${p.event}</td>
              <td><button class="btn btn-sm" onClick=${() => onEmit(p.event)}>Emit</button></td>
            </tr>
          `)}
        </tbody>
      </table>
    </div>
  `
}

// ─── FilterTabs ──────────────────────────────────────────────

const RUN_FILTERS = ['all', 'running', 'idle', 'completed', 'errored']

function FilterTabs({ active, onChange }) {
  return html`
    <div class="tabs mb-4">
      ${RUN_FILTERS.map(f => html`
        <button key=${f} class="tab ${active === f ? 'active' : ''}" onClick=${() => onChange(f)}>
          ${f.charAt(0).toUpperCase() + f.slice(1)}
        </button>
      `)}
    </div>
  `
}

// ─── Pagination ──────────────────────────────────────────────

function Pagination({ offset, pageSize, total, onPrev, onNext }) {
  if (total <= 0) return null
  const from = offset + 1
  const to = Math.min(offset + pageSize, total)
  return html`
    <div style="display:flex;margin-top:var(--space-3);align-items:center;gap:var(--space-3);flex-wrap:wrap">
      <button class="btn btn-sm" disabled=${offset === 0} onClick=${onPrev}>\u2190 Prev</button>
      <span class="label-muted" style="margin:0">${from}\u2013${to} of ${total}</span>
      <button class="btn btn-sm" disabled=${offset + pageSize >= total} onClick=${onNext}>Next \u2192</button>
    </div>
  `
}

// ─── Runs Panel ──────────────────────────────────────────────

function RunsPanel({ onRowClick, activeRunId }) {
  const [filter, setFilter] = useState('all')
  const [offset, setOffset] = useState(0)
  const [data, setData] = useState({ runs: [], total: 0 })
  const PAGE_SIZE = 50

  const doFetch = useCallback(async () => {
    try {
      const params = new URLSearchParams({ limit: String(PAGE_SIZE), offset: String(offset) })
      if (filter !== 'all') params.set('state', filter)
      const result = await api('/runs?' + params)
      setData({ runs: result.runs || [], total: result.total || 0 })
    } catch {}
  }, [filter, offset])

  usePolling(doFetch, 3000, true)

  const onFilterChange = (f) => {
    setFilter(f)
    setOffset(0)
  }

  return html`
    <div>
      <${FilterTabs} active=${filter} onChange=${onFilterChange} />
      ${data.runs.length === 0
        ? html`<div class="empty">No runs found</div>`
        : html`<${RunsTable} runs=${data.runs} onRowClick=${onRowClick} activeRunId=${activeRunId} />`
      }
      <${Pagination}
        offset=${offset}
        pageSize=${PAGE_SIZE}
        total=${data.total}
        onPrev=${() => setOffset(Math.max(0, offset - PAGE_SIZE))}
        onNext=${() => setOffset(offset + PAGE_SIZE)}
      />
    </div>
  `
}

// ─── EffectsList ─────────────────────────────────────────────

function EffectItem({ effect }) {
  const [open, setOpen] = useState(false)
  const displayKey = stripEffectPrefix(effect.effectKey)
  const hasOutput = effect.output !== null || effect.error
  return html`
    <div class="effect-item">
      <span class="effect-key">${displayKey}</span>
      <${Badge} state=${effect.state} />
      ${hasOutput && html`
        <span class="effect-toggle" onClick=${() => setOpen(!open)}>${open ? '[hide]' : '[show]'}</span>
        <div class="effect-output ${open ? 'open' : ''}">
          <${JsonBlock} data=${effect.error || effect.output} />
        </div>
      `}
    </div>
  `
}

function EffectsList({ effects }) {
  if (!effects || !effects.length) return null
  return html`
    <${DetailRow} label="Effects">
      <div class="effects-list">
        ${effects.map((ef, i) => html`<${EffectItem} key=${i} effect=${ef} />`)}
      </div>
    <//>
  `
}

// ─── StepDetail ──────────────────────────────────────────────

function StepDetail({ run, effects, onRetry, onRequeue, onReemit }) {
  if (!run) return html`<div class="empty">Select a step</div>`

  return html`
    <div class="step-detail">
      <div class="step-detail-header">
        <span class="step-detail-title">${run.processName}</span>
        <${Badge} state=${run.state} />
      </div>

      <${DetailRow} label="Payload"><${JsonBlock} data=${run.payload} /><//>

      <${EffectsList} effects=${effects} />

      ${run.state === 'errored' && run.result?.error && html`
        <${DetailRow} label="Error"><${JsonBlock} data=${run.result.error} /><//>
      `}

      ${run.context && Object.keys(run.context).length > 0 && html`
        <${DetailRow} label="Context"><${JsonBlock} data=${run.context} /><//>
      `}

      <div class="step-actions">
        ${run.state === 'errored' && html`
          <button class="btn btn-sm" onClick=${() => onRetry(run.id)}>Retry</button>
          <button class="btn btn-sm" onClick=${() => onRequeue(run.id)}>Requeue</button>
        `}
        <button class="btn btn-sm" onClick=${() => onReemit(run.eventName, run.payload)}>Re-emit</button>
      </div>
    </div>
  `
}

// ─── Timeline ────────────────────────────────────────────────

function Timeline({ chain, selectedIdx, onSelect }) {
  const stateIcon = (state) =>
    state === 'completed' ? '\u2713' : state === 'errored' ? '\u2717' : state === 'running' ? '\u25B6' : '\u25CF'

  return html`
    <div class="timeline">
      ${chain.map((c, i) => html`
        <div key=${c.id} class="timeline-step ${i === selectedIdx ? 'selected' : ''}" onClick=${() => onSelect(i)}>
          <span class="timeline-step-num">${i + 1}</span>
          <span class="timeline-step-dot ${c.state}"></span>
          <span class="timeline-step-name">${c.processName}</span>
          <${Badge} state=${c.state} />
          <span class="timeline-step-icon">${stateIcon(c.state)}</span>
        </div>
      `)}
    </div>
  `
}

// ─── RunOverlay ──────────────────────────────────────────────

function RunOverlay({ overlay, actions }) {
  const { open, runId, run, chain, selectedStepIdx, stepDetail } = overlay

  // Poll overlay data while open + not all terminal
  usePolling(
    async () => {
      if (!runId) return
      await actions.refreshOverlay(runId)
    },
    1500,
    open && chain.some(c => c.state !== 'completed' && c.state !== 'errored'),
  )

  useEscapeKey(() => { if (open) actions.closeOverlay() })

  if (!open) return html`<div class="run-overlay"></div>`

  const rootRun = chain.find(c => c.parentRunId === null) || chain[0]

  return html`
    <div class="run-overlay open">
      <div class="overlay-header">
        <span style="font-weight:700;text-transform:uppercase;letter-spacing:var(--tracking-wide);font-size:var(--text-sm)">
          Run ${shortId(runId)}
        </span>
        <button class="modal-close" style="border-color:var(--white);color:var(--white)" onClick=${actions.closeOverlay}>\u00d7</button>
      </div>
      <div class="overlay-body">
        ${run ? html`
          <${DetailRow} label="ID">${run.id}<//>
          <${DetailRow} label="Process">${run.processName}<//>
          <${DetailRow} label="Event">${run.eventName}<//>
          <${DetailRow} label="State"><${Badge} state=${run.state} /><//>
          <${DetailRow} label="Correlation">${shortId(run.correlationId)}<//>
        ` : html`<div class="empty">Loading...</div>`}

        ${chain.length > 0 && html`
          <div class="label mt-5 mb-3">Timeline</div>
          <${Timeline} chain=${chain} selectedIdx=${selectedStepIdx} onSelect=${(i) => actions.selectStep(i)} />
        `}

        ${stepDetail.run && html`
          <${StepDetail}
            run=${stepDetail.run}
            effects=${stepDetail.effects}
            onRetry=${actions.retryStep}
            onRequeue=${actions.requeueStep}
            onReemit=${actions.reemitStep}
          />
        `}

        ${chain.length > 1 && rootRun && html`
          <button class="btn btn-sm mt-4" onClick=${() => actions.viewInTrace(rootRun.id)}>View in Trace</button>
        `}
      </div>
    </div>
  `
}

// ─── Emit Panel ──────────────────────────────────────────────

function EmitPanel({ emit, onUpdate, onSubmit }) {
  const textareaRef = useRef(null)

  const onKeyDown = (e) => {
    if (e.key === 'Tab') {
      e.preventDefault()
      const ta = e.target
      const start = ta.selectionStart
      ta.value = ta.value.substring(0, start) + '  ' + ta.value.substring(ta.selectionEnd)
      ta.selectionStart = ta.selectionEnd = start + 2
      onUpdate({ payload: ta.value })
    }
  }

  // Auto-focus payload when pre-filled via re-emit
  useEffect(() => {
    if (emit.focusPayload && textareaRef.current) {
      textareaRef.current.focus()
      onUpdate({ focusPayload: false })
    }
  }, [emit.focusPayload])

  return html`
    <div class="stack" style="max-width:600px">
      <div class="field">
        <span class="label">Event Name</span>
        <input class="input" type="text" value=${emit.eventName}
          onInput=${(e) => onUpdate({ eventName: e.target.value })}
          placeholder="e.g. email:new" spellcheck="false" />
      </div>
      <div class="field">
        <span class="label">Payload (JSON)</span>
        <textarea ref=${textareaRef} class="textarea" spellcheck="false" style="height:180px"
          value=${emit.payload}
          onInput=${(e) => onUpdate({ payload: e.target.value })}
          onKeyDown=${onKeyDown}></textarea>
      </div>
      <div class="field">
        <span class="label">Idempotency Key (optional)</span>
        <input class="input" type="text" value=${emit.idempotencyKey}
          onInput=${(e) => onUpdate({ idempotencyKey: e.target.value })}
          placeholder="leave empty for none" spellcheck="false" />
      </div>
      <button class="btn btn-primary" disabled=${emit.submitting} onClick=${onSubmit}>Emit Event</button>
      ${emit.result && html`
        <div class="emit-result ${emit.result.ok ? 'success' : 'error'}">${emit.result.text}</div>
      `}
    </div>
  `
}

// ─── Trace Panel ─────────────────────────────────────────────

function TracePicker({ options, selectedId, onChange }) {
  return html`
    <div class="field mb-5">
      <span class="label">Select a completed chain to trace</span>
      <select class="select" value=${selectedId} onChange=${(e) => onChange(e.target.value)}>
        <option value="">-- select a run --</option>
        ${options.map(o => html`<option key=${o.id} value=${o.id}>${o.label}</option>`)}
      </select>
    </div>
  `
}

function GanttChart({ trace, onSpanClick }) {
  if (!trace || !trace.spans || !trace.spans.length) return null

  const { spans, minTime, durationMs } = trace
  const totalDuration = Math.max(durationMs, 1)

  // Label budget: name text + badge (94px) + gap (8px) + container padding (24px) = 126px overhead
  const longest = Math.max(...spans.map(s => s.processName.length))
  const labelW = Math.max(240, longest * 10 + 130)

  const tickCount = 6
  const ticks = Array.from({ length: tickCount + 1 }, (_, i) => Math.round((i / tickCount) * totalDuration))

  return html`
    <div class="gantt" style="--gantt-label-w:${labelW}px">
      <div class="gantt-header">
        <span class="label" style="margin:0">Trace \u2014 ${spans.length} span${spans.length > 1 ? 's' : ''}</span>
        <span class="label-muted" style="margin:0">Total: ${totalDuration}ms</span>
      </div>
      <div class="gantt-ruler">
        ${ticks.map(ms => html`<span key=${ms}>${ms}ms</span>`)}
      </div>
      ${spans.map(span => {
        const idleStart = span.idleAt !== null ? ((span.idleAt - minTime) / totalDuration * 100) : 0
        const runningStart = span.runningAt !== null ? ((span.runningAt - minTime) / totalDuration * 100) : idleStart
        const endPos = span.completedAt !== null ? ((span.completedAt - minTime) / totalDuration * 100) : 100

        const idleWidth = runningStart - idleStart
        const activeWidth = Math.max(endPos - runningStart, 0.5)
        const activeDuration = span.runningAt !== null && span.completedAt !== null
          ? span.completedAt - span.runningAt
          : null

        return html`
          <div key=${span.id} class="gantt-row" onClick=${() => onSpanClick(span.id)}>
            <div class="gantt-label">
              <span class="gantt-label-name">${span.processName}</span>
              <${Badge} state=${span.state} />
            </div>
            <div class="gantt-track">
              ${idleWidth > 0.1 && html`
                <div class="gantt-bar gantt-bar-idle" style="left:${idleStart}%;width:${idleWidth}%"></div>
              `}
              <div class="gantt-bar gantt-bar-active ${span.state}" style="left:${runningStart}%;width:${activeWidth}%">
                ${activeDuration !== null && html`<span class="gantt-bar-duration">${activeDuration}ms</span>`}
              </div>
            </div>
          </div>
        `
      })}
    </div>
  `
}

function TracePanel({ onSpanClick }) {
  const [options, setOptions] = useState([])
  const [selectedId, setSelectedId] = useState('')
  const [traceData, setTraceData] = useState(null)
  const [loading, setLoading] = useState(false)

  // Expose setters for viewInTrace action
  const panelRef = useRef({ setSelectedId, setTraceData, setOptions })
  useEffect(() => {
    panelRef.current = { setSelectedId, setTraceData, setOptions }
    window.__tracePanel = panelRef.current
    return () => { window.__tracePanel = null }
  })

  const loadOptions = useCallback(async () => {
    try {
      const data = await api('/runs?limit=100&root=true')
      const runs = data.runs || []

      setOptions(runs.map(r => {
        const when = new Date(r.startedAt).toLocaleTimeString()
        const hasChain = r.childRunIds && r.childRunIds.length > 0
        return { id: r.id, label: `${r.processName} / ${r.eventName}${hasChain ? ' \u25B8 chain' : ''} \u2014 ${when}` }
      }))
    } catch {}
  }, [])

  // Load options on mount
  useEffect(() => { loadOptions() }, [])

  const onSelect = useCallback(async (id) => {
    setSelectedId(id)
    if (!id) { setTraceData(null); return }
    setLoading(true)
    try {
      const data = await api('/runs/' + id + '/trace')
      setTraceData(data)
    } catch {
      setTraceData(null)
    }
    setLoading(false)
  }, [])

  return html`
    <div>
      <${TracePicker} options=${options} selectedId=${selectedId} onChange=${onSelect} />
      ${loading && html`<div class="empty">Loading trace...</div>`}
      ${!loading && traceData && html`<${GanttChart} trace=${traceData} onSpanClick=${onSpanClick} />`}
      ${!loading && selectedId && traceData && (!traceData.spans || !traceData.spans.length) && html`
        <div class="empty">No trace data</div>
      `}
    </div>
  `
}

// ─── App ─────────────────────────────────────────────────────

function App() {
  const [activeTab, setActiveTab] = useState('overview')
  const [health, setHealth] = useState({ uptime: '--', queue: {}, processes: [] })
  const [recentRuns, setRecentRuns] = useState({ runs: [], total: 0 })
  const [ticker, setTicker] = useState([])
  const [overlay, setOverlay] = useState({
    open: false,
    runId: null,
    run: null,
    chain: [],
    selectedStepIdx: -1,
    stepDetail: { run: null, effects: [] },
  })
  const [emit, setEmit] = useState({
    eventName: '',
    payload: '{}',
    idempotencyKey: '',
    result: null,
    submitting: false,
    focusPayload: false,
  })

  const lastSnapRef = useRef('')

  // ─── Ticker helper ───
  const addTicker = useCallback((node) => {
    setTicker(prev => {
      const next = [html`<${TickerMsg} time=${timeStr()}>${node}<//>`,...prev]
      return next.slice(0, 20)
    })
  }, [])

  // ─── Health polling (overview tab) ───
  const fetchHealth = useCallback(async () => {
    try {
      const data = await api('/health')
      setHealth({ uptime: formatUptime(data.uptime), queue: data.queue || {}, processes: data.processes || [] })

      const runsData = await api('/runs?limit=10')
      const runs = runsData.runs || []
      setRecentRuns({ runs, total: runsData.total ?? runs.length })

      // Detect new runs for ticker
      const snap = JSON.stringify(runs.map(r => r.id + r.state))
      if (lastSnapRef.current && snap !== lastSnapRef.current) {
        const newRuns = runs.filter(r => !lastSnapRef.current.includes(r.id))
        newRuns.forEach(r => {
          addTicker(html`<span class="t-event">${r.eventName}</span> \u2192 ${r.processName} <${Badge} state=${r.state} />`)
        })
      }
      lastSnapRef.current = snap
    } catch {
      setHealth(prev => ({ ...prev, uptime: 'offline' }))
    }
  }, [addTicker])

  usePolling(fetchHealth, 2000, true)

  // ─── Overlay actions ───
  const actions = {
    openOverlay: async (id) => {
      setOverlay(prev => ({ ...prev, open: true, runId: id, run: null, chain: [], selectedStepIdx: -1, stepDetail: { run: null, effects: [] } }))
      try {
        // Walk up to the root so we always show the full chain
        let run = await api('/runs/' + id)
        let rootId = id
        while (run.parentRunId) {
          rootId = run.parentRunId
          run = await api('/runs/' + rootId)
        }
        const chainData = await api('/runs/' + rootId + '/chain')
        const chain = (chainData.runs || []).sort((a, b) => (a.depth ?? 0) - (b.depth ?? 0) || a.startedAt - b.startedAt)
        const clickedRun = chain.find(c => c.id === id) || run
        const clickedIdx = chain.findIndex(c => c.id === id)
        const idx = clickedIdx >= 0 ? clickedIdx : 0
        setOverlay(prev => ({ ...prev, run: clickedRun, chain, selectedStepIdx: idx }))
        // Load step detail for selected
        if (chain[idx]) {
          const [stepRun, effectsData] = await Promise.all([api('/runs/' + chain[idx].id), api('/runs/' + chain[idx].id + '/effects')])
          setOverlay(prev => ({ ...prev, stepDetail: { run: stepRun, effects: effectsData.effects || [] } }))
        }
      } catch {
        setOverlay(prev => ({ ...prev, run: null, chain: [] }))
      }
    },

    closeOverlay: () => {
      setOverlay(prev => ({ ...prev, open: false, runId: null }))
    },

    refreshOverlay: async (id) => {
      try {
        // Walk up to root for full chain
        let run = await api('/runs/' + id)
        let rootId = id
        while (run.parentRunId) {
          rootId = run.parentRunId
          run = await api('/runs/' + rootId)
        }
        const chainData = await api('/runs/' + rootId + '/chain')
        const chain = (chainData.runs || []).sort((a, b) => (a.depth ?? 0) - (b.depth ?? 0) || a.startedAt - b.startedAt)
        const clickedRun = chain.find(c => c.id === id) || run
        setOverlay(prev => ({ ...prev, run: clickedRun, chain }))
        // Refresh step detail too
        setOverlay(prev => {
          const step = prev.chain[prev.selectedStepIdx]
          if (step) {
            Promise.all([api('/runs/' + step.id), api('/runs/' + step.id + '/effects')]).then(([stepRun, effectsData]) => {
              setOverlay(p => ({ ...p, stepDetail: { run: stepRun, effects: effectsData.effects || [] } }))
            })
          }
          return prev
        })
      } catch {}
    },

    selectStep: async (idx) => {
      setOverlay(prev => ({ ...prev, selectedStepIdx: idx, stepDetail: { run: null, effects: [] } }))
      setOverlay(prev => {
        const step = prev.chain[idx]
        if (step) {
          Promise.all([api('/runs/' + step.id), api('/runs/' + step.id + '/effects')]).then(([stepRun, effectsData]) => {
            setOverlay(p => ({ ...p, stepDetail: { run: stepRun, effects: effectsData.effects || [] } }))
          })
        }
        return prev
      })
    },

    retryStep: async (runId) => {
      try {
        const data = await api('/runs/' + runId + '/retry', { method: 'POST' })
        addTicker(html`retried <span class="t-event">${shortId(runId)}</span> \u2192 <${Badge} state=${data.state} />`)
        setOverlay(prev => {
          if (prev.runId) actions.refreshOverlay(prev.runId)
          return prev
        })
      } catch (err) {
        addTicker(html`retry failed: ${err.message || 'unknown error'}`)
      }
    },

    requeueStep: async (runId) => {
      try {
        const data = await api('/runs/' + runId + '/requeue', { method: 'POST' })
        addTicker(html`requeued <span class="t-event">${shortId(runId)}</span> \u2192 <${Badge} state=${data.state} />`)
        setOverlay(prev => {
          if (prev.runId) actions.refreshOverlay(prev.runId)
          return prev
        })
      } catch (err) {
        addTicker(html`requeue failed: ${err.message || 'unknown error'}`)
      }
    },

    reemitStep: (eventName, payload) => {
      actions.closeOverlay()
      setActiveTab('emit')
      setEmit({
        eventName,
        payload: typeof payload === 'string' ? payload : JSON.stringify(payload, null, 2),
        idempotencyKey: '',
        result: null,
        submitting: false,
        focusPayload: true,
      })
    },

    viewInTrace: async (rootId) => {
      actions.closeOverlay()
      setActiveTab('trace')
      // Wait a tick for TracePanel to mount, then drive it
      setTimeout(async () => {
        const tp = window.__tracePanel
        if (!tp) return
        // Load fresh options
        try {
          const data = await api('/runs?limit=100&root=true')
          const runs = data.runs || []
          tp.setOptions(runs.map(r => {
            const when = new Date(r.startedAt).toLocaleTimeString()
            const hasChain = r.childRunIds && r.childRunIds.length > 0
            return { id: r.id, label: `${r.processName} / ${r.eventName}${hasChain ? ' \u25B8 chain' : ''} \u2014 ${when}` }
          }))
        } catch {}
        tp.setSelectedId(rootId)
        try {
          const traceData = await api('/runs/' + rootId + '/trace')
          tp.setTraceData(traceData)
        } catch {}
      }, 50)
    },
  }

  // ─── Emit submit ───
  const onEmitSubmit = useCallback(async () => {
    const eventName = emit.eventName.trim()
    if (!eventName) {
      setEmit(prev => ({ ...prev, result: { ok: false, text: 'Event name is required' } }))
      return
    }
    let payload
    try {
      payload = JSON.parse(emit.payload.trim())
    } catch {
      setEmit(prev => ({ ...prev, result: { ok: false, text: 'Invalid JSON payload' } }))
      return
    }
    const body = { event: eventName, payload }
    if (emit.idempotencyKey.trim()) body.idempotencyKey = emit.idempotencyKey.trim()

    setEmit(prev => ({ ...prev, submitting: true }))
    try {
      const data = await api('/emit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      })
      setEmit(prev => ({ ...prev, submitting: false, result: { ok: true, text: formatJson(data) } }))
      addTicker(html`emit <span class="t-event">${eventName}</span> \u2192 ${data.created} run(s) created`)
    } catch (err) {
      setEmit(prev => ({ ...prev, submitting: false, result: { ok: false, text: err.message || 'Request failed' } }))
    }
  }, [emit, addTicker])

  // ─── Emit from process ───
  const emitFromProcess = useCallback((eventName) => {
    setActiveTab('emit')
    setEmit({ eventName, payload: '{}', idempotencyKey: '', result: null, submitting: false, focusPayload: false })
  }, [])

  // ─── Render ───
  return html`
    <${Nav} activeTab=${activeTab} uptime=${health.uptime} onTab=${setActiveTab} />

    <div class="dashboard-main">
      ${activeTab === 'overview' && html`
        <${OverviewPanel} health=${health} recentRuns=${recentRuns} onRowClick=${actions.openOverlay} activeRunId=${overlay.open ? overlay.runId : null} />
      `}
      ${activeTab === 'processes' && html`
        <${ProcessesPanel} processes=${health.processes} onEmit=${emitFromProcess} />
      `}
      ${activeTab === 'runs' && html`
        <${RunsPanel} onRowClick=${actions.openOverlay} activeRunId=${overlay.open ? overlay.runId : null} />
      `}
      ${activeTab === 'trace' && html`
        <${TracePanel} onSpanClick=${actions.openOverlay} />
      `}
      ${activeTab === 'emit' && html`
        <${EmitPanel} emit=${emit} onUpdate=${(patch) => setEmit(prev => ({ ...prev, ...patch }))} onSubmit=${onEmitSubmit} />
      `}
    </div>

    <${Ticker} messages=${ticker} />
    <${RunOverlay} overlay=${overlay} actions=${actions} />
  `
}

render(html`<${App} />`, document.getElementById('app'))
</script>
</body>
</html>
